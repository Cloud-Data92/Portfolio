# Gitleaks config — extends the default ruleset.
# Allowlists ONLY well-known public Polygon/Polymarket contract addresses that the
# default "generic-api-key" rule false-positives on. Real keys are still caught.

[extend]
useDefault = true

[allowlist]
description = "Public on-chain contract addresses (not secrets)"
regexes = [
  '''0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174''', # USDC.e (bridged) on Polygon
  '''0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359''', # native USDC on Polygon
  '''0x4D97DCd97eC945f40cF65F87097ACe5EA0476045''', # Polymarket Conditional Tokens Framework
  '''0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E''', # Polymarket CTF Exchange
  '''0xC5d563A36AE78145C45a50134d48A1215220f80a''', # Polymarket Neg-Risk CTF Exchange
  '''0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296''', # Polymarket Neg-Risk Adapter
  '''0xc907E116054Ad103354f2D350FD2514433D57F6f''', # Chainlink BTC/USD feed on Polygon
  '''MTA4NzY1NDMyMTA5ODc2NTQzMjE''',                # deliberately fake example token in SECURITY.md
]
